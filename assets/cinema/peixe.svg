<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Pela Boca Morre o Peixe">
  <defs>
    <radialGradient id="p-bg" cx="55%" cy="62%" r="78%">
      <stop offset="0%" stop-color="#3a2a4a"/>
      <stop offset="55%" stop-color="#160e22"/>
      <stop offset="100%" stop-color="#070509"/>
    </radialGradient>
    <linearGradient id="p-fissure" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#070509" stop-opacity="0"/>
      <stop offset="20%" stop-color="#070509" stop-opacity="0.95"/>
      <stop offset="80%" stop-color="#070509" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#070509" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="1000" fill="url(#p-bg)"/>

  <!-- vertical fissure: thin black bar splitting the composition -->
  <rect x="912" y="80" width="6" height="840" fill="url(#p-fissure)"/>
  <rect x="918" y="80" width="1" height="840" fill="#f4f0e8" fill-opacity="0.18"/>

  <!-- filmstrip perforations -->
  <g fill="#f4f0e8" fill-opacity="0.18">
    <rect x="38" y="80" width="38" height="68" rx="5"/>
    <rect x="38" y="190" width="38" height="68" rx="5"/>
    <rect x="38" y="300" width="38" height="68" rx="5"/>
    <rect x="38" y="410" width="38" height="68" rx="5"/>
    <rect x="38" y="520" width="38" height="68" rx="5"/>
    <rect x="38" y="630" width="38" height="68" rx="5"/>
    <rect x="38" y="740" width="38" height="68" rx="5"/>
    <rect x="38" y="850" width="38" height="68" rx="5"/>
  </g>

  <!-- vertical credit -->
  <text transform="translate(1554 928) rotate(-90)" fill="#f4f0e8" fill-opacity="0.6"
        font-family="'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="500" letter-spacing="6">DIR. JO&#195;O P. NUNES &#183; 2014</text>

  <!-- title -->
  <g font-family="'Cormorant Garamond', Georgia, 'Times New Roman', serif" fill="#f4f0e8" letter-spacing="-7">
    <text x="170" y="500" font-size="186" font-weight="500">Pela Boca</text>
    <text x="170" y="700" font-size="186" font-weight="500" font-style="italic" fill="#ccb07a">morre o peixe</text>
  </g>

  <!-- "bitten" notch on the descender of the lower line -->
  <rect x="334" y="660" width="44" height="60" fill="#070509"/>
</svg>
