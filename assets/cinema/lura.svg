<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Lura">
  <defs>
    <linearGradient id="l-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1d2530"/>
      <stop offset="55%" stop-color="#1a1410"/>
      <stop offset="100%" stop-color="#0a0706"/>
    </linearGradient>
    <radialGradient id="l-glow" cx="78%" cy="78%" r="55%">
      <stop offset="0%" stop-color="#a87a48" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#0a0706" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="l-sky" cx="20%" cy="14%" r="60%">
      <stop offset="0%" stop-color="#7a92aa" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#1d2530" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="1000" fill="url(#l-bg)"/>
  <rect width="1600" height="1000" fill="url(#l-sky)"/>
  <rect width="1600" height="1000" fill="url(#l-glow)"/>

  <!-- low horizon line -->
  <line x1="120" y1="760" x2="1480" y2="760" stroke="#f4f0e8" stroke-opacity="0.32"/>

  <!-- isolated small figure (a solitary mark on the horizon) -->
  <circle cx="1180" cy="730" r="14" fill="#ccb07a" fill-opacity="0.85"/>
  <line x1="1180" y1="744" x2="1180" y2="800" stroke="#ccb07a" stroke-opacity="0.55" stroke-width="1.5"/>

  <!-- distant moon high left -->
  <circle cx="320" cy="220" r="58" fill="#f4f0e8" fill-opacity="0.06"/>
  <circle cx="320" cy="220" r="58" fill="none" stroke="#f4f0e8" stroke-opacity="0.18"/>

  <!-- filmstrip perforations -->
  <g fill="#f4f0e8" fill-opacity="0.18">
    <rect x="38" y="80" width="38" height="68" rx="5"/>
    <rect x="38" y="190" width="38" height="68" rx="5"/>
    <rect x="38" y="300" width="38" height="68" rx="5"/>
    <rect x="38" y="410" width="38" height="68" rx="5"/>
    <rect x="38" y="520" width="38" height="68" rx="5"/>
    <rect x="38" y="630" width="38" height="68" rx="5"/>
    <rect x="38" y="740" width="38" height="68" rx="5"/>
    <rect x="38" y="850" width="38" height="68" rx="5"/>
  </g>

  <!-- vertical credit -->
  <text transform="translate(1554 928) rotate(-90)" fill="#f4f0e8" fill-opacity="0.6"
        font-family="'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="500" letter-spacing="6">DIR. LU&#205;S BR&#193;S &#183; 2013</text>

  <!-- title -->
  <g font-family="'Cormorant Garamond', Georgia, 'Times New Roman', serif" fill="#f4f0e8" letter-spacing="-18">
    <text x="170" y="620" font-size="440" font-weight="500">Lura</text>
  </g>
</svg>
