name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Stage publishable site
        run: |
          rm -rf _site
          mkdir -p _site/src _site/assets
          cp index.html _site/
          cp 404.html _site/
          cp styles.css _site/
          cp script.js _site/
          cp motion.js _site/
          cp site.webmanifest _site/
          cp robots.txt _site/
          cp sitemap.xml _site/
          cp llms.txt _site/
          cp llms-full.txt _site/
          cp src/i18n.js _site/src/
          cp -R assets/. _site/assets/

      - name: Stamp sitemap lastmod from git
        run: node scripts/build-sitemap.mjs --out=_site/sitemap.xml

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v5
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
