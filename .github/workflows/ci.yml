name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Verify styles.css is up to date
        run: |
          if ! git diff --exit-code styles.css; then
            echo "::error::styles.css is out of sync with src/input.css. Run 'npm run build:css' and commit the result."
            exit 1
          fi
